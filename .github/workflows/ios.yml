name: iOS Validation

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Install pinned XcodeGen
        run: |
          brew install mint
          mint install yonaskolb/XcodeGen@2.45.4
          echo "$HOME/.mint/bin" >> "$GITHUB_PATH"
          "$HOME/.mint/bin/xcodegen" version

      - name: Generate project
        run: make generate

      - name: Build app
        run: make build

      - name: Run unit tests
        run: make test
