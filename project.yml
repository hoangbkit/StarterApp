name: StarterApp
options:
  minimumXcodeGenVersion: 2.45.4
  xcodeVersion: '26.0'
  developmentLanguage: en
  useBaseInternationalization: true
  createIntermediateGroups: true
  groupSortPosition: top
  schemePathPrefix: ../../
  deploymentTarget:
    iOS: '26.0'
configs:
  Debug: debug
  Release: release
settings:
  base:
    IPHONEOS_DEPLOYMENT_TARGET: '26.0'
    SWIFT_VERSION: '6.0'
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: true
packages:
  AppFoundation:
    url: https://github.com/hoangbkit/AppFoundation.git
    revision: b282980df6c81c8510195fb546299c0296aa8474
fileGroups:
- README.md
- StarterApp/Configuration.storekit
targets:
  StarterApp:
    type: application
    platform: iOS
    deploymentTarget: '26.0'
    sources:
    - path: StarterApp
      excludes:
      - Configuration.storekit
    dependencies:
    - package: AppFoundation
      product: AppFoundation
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hoangbkit.starterapp
        PRODUCT_NAME: StarterApp
        DEVELOPMENT_TEAM: J458WW3452
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: '1.0'
        CURRENT_PROJECT_VERSION: '1'
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
        SWIFT_EMIT_LOC_STRINGS: true
        TARGETED_DEVICE_FAMILY: 1,2
    info:
      path: Generated/StarterApp-Info.plist
      properties:
        CFBundleDisplayName: StarterApp
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
        - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
        - UIInterfaceOrientationPortrait
        - UIInterfaceOrientationPortraitUpsideDown
        - UIInterfaceOrientationLandscapeLeft
        - UIInterfaceOrientationLandscapeRight
  StarterAppTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: '26.0'
    sources:
    - StarterAppTests
    dependencies:
    - target: StarterApp
    - package: AppFoundation
      product: AppFoundation
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hoangbkit.starterapp.tests
        DEVELOPMENT_TEAM: J458WW3452
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: true
  StarterAppUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: '26.0'
    sources:
    - StarterAppUITests
    dependencies:
    - target: StarterApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hoangbkit.starterapp.uitests
        DEVELOPMENT_TEAM: J458WW3452
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: true
schemes:
  StarterApp:
    build:
      targets:
        StarterApp: all
        StarterAppTests:
        - test
    run:
      config: Debug
      storeKitConfiguration: StarterApp/Configuration.storekit
    test:
      config: Debug
      gatherCoverageData: true
      coverageTargets:
      - StarterApp
      targets:
      - name: StarterAppTests
        parallelizable: true
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
    management:
      shared: true
      orderHint: 0
  StarterApp Simulated:
    build:
      targets:
        StarterApp: all
        StarterAppTests:
        - test
    run:
      config: Debug
      environmentVariables:
        APPFOUNDATION_PURCHASE_MODE: simulated
    test:
      config: Debug
      gatherCoverageData: true
      coverageTargets:
      - StarterApp
      targets:
      - name: StarterAppTests
        parallelizable: true
      environmentVariables:
        APPFOUNDATION_PURCHASE_MODE: simulated
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
    management:
      shared: true
      orderHint: 1
  StarterApp UI Tests:
    build:
      targets:
        StarterApp:
        - run
        - test
        StarterAppUITests:
        - test
    test:
      config: Debug
      targets:
      - name: StarterAppUITests
    management:
      shared: true
      orderHint: 2
